name: 掘金自动签到抽奖（9:15±30分钟执行）
on:
  schedule:
    - cron: '15 1 * * *'
  workflow_dispatch:

jobs:
  juejin-auto:
    runs-on: ubuntu-latest
    steps:
      - name: 安装Node.js和axios
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install axios

      - name: 执行签到+抽奖（防风控版）
        env:
          JUEJIN_COOKIE: ${{ secrets.JUEJIN_COOKIE }}
        run: |
          node -e '
            const axios = require("axios");
            const axiosRetry = require("axios-retry");

            // 1. 配置axios（重试+防风控）
            const instance = axios.create({
              baseURL: "https://api.juejin.cn",
              timeout: 15000,
              headers: {
                "Cookie": process.env.JUEJIN_COOKIE,
                "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/144.0.0.0 Safari/537.36",
                "Referer": "https://juejin.cn/",
                "Origin": "https://juejin.cn",
                "Accept": "application/json, */*",
                "Accept-Encoding": "gzip, deflate, br",
                "Content-Type": "application/json"
              },
              // 自动解压所有压缩格式
              decompress: true,
              // 重试3次，防临时风控
              retryDelay: axiosRetry.exponentialDelay
            });
            axiosRetry(instance, { retries: 3 });

            // 2. 核心任务
            async function runTask() {
              try {
                const now = new Date().toLocaleString("zh-CN", { timeZone: "Asia/Shanghai" });
                console.log("[INFO] 开始执行（北京时间）:", now);

                // 签到
                let checkinRes = {};
                try {
                  checkinRes = await instance.post("/growth_api/v1/check_in", {});
                  checkinRes = checkinRes.data;
                  console.log("[✅ 签到成功]", checkinRes);
                } catch (e) {
                  console.log("[❌ 签到失败]", e.message || e.response?.data || "空响应（风控拦截）");
                }

                // 抽奖
                let drawRes = {};
                try {
                  drawRes = await instance.post("/growth_api/v1/lottery/draw", {});
                  drawRes = drawRes.data;
                  console.log("[✅ 抽奖成功]", drawRes);
                } catch (e) {
                  console.log("[❌ 抽奖失败]", e.message || e.response?.data || "空响应（风控拦截）");
                }

              } catch (error) {
                console.error("[💥 执行失败]", error.message);
              }
            }

            // 3. 0~30分钟随机延迟
            const delayMs = Math.floor(Math.random() * 30 * 60 * 1000);
            const delayMinutes = Math.round(delayMs / 60000);
            console.log("[INFO] 延迟:", delayMinutes, "分钟");
            setTimeout(runTask, delayMs);
          '
