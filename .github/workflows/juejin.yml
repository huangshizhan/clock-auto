name: 掘金自动签到抽奖（0成本+随机延迟）
on:
  schedule:
    - cron: '0 0 * * *'  # 基础时间：UTC 0点 = 北京时间8点
  workflow_dispatch:     # 手动触发开关

jobs:
  auto-checkin:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 24  # 升级到最新版，消除弃用警告

      - name: 执行签到+抽奖（带±30分钟随机延迟）
        env:
          JUEJIN_COOKIE: ${{ secrets.JUEJIN_COOKIE }}
        run: |
          npm install juejin-helper@latest
          
          node -e "
            const JuejinHelper = require('juejin-helper');
            
            // 生成±30分钟随机延迟（毫秒）
            function getRandomDelay() {
              const min = -30 * 60 * 1000;
              const max = 30 * 60 * 1000;
              return Math.floor(Math.random() * (max - min + 1)) + min;
            }

            // 核心任务
            async function runJuejinTask() {
              try {
                const juejin = new JuejinHelper();
                await juejin.login(process.env.JUEJIN_COOKIE);
                console.log('[INFO] 掘金登录成功');

                const checkinResult = await juejin.checkIn();
                console.log('[INFO] 签到结果:', checkinResult);

                const drawResult = await juejin.drawLottery();
                console.log('[INFO] 抽奖结果:', drawResult);

              } catch (error) {
                console.error('[ERROR] 任务执行失败:', error.message);
                console.error(error.stack);
                process.exit(1);
              }
            }

            // 延迟执行
            const delayMs = getRandomDelay();
            const delayMinutes = Math.round(delayMs / 60000);
            console.log('[INFO] 本次随机延迟:', delayMinutes, '分钟');
            setTimeout(runJuejinTask, delayMs);
          "
