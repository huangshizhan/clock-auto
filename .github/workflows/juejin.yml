name: 掘金自动签到抽奖（9:15执行）
on:
  schedule:
    - cron: '15 1 * * *'  # 北京时间9:15（UTC+8 → UTC 1:15）
  workflow_dispatch:     # 手动触发开关

jobs:
  juejin-auto:
    runs-on: ubuntu-latest
    steps:
      - name: 安装Node.js环境（显式指定版本，避免兼容问题）
        uses: actions/setup-node@v4
        with:
          node-version: 24  # 稳定版Node.js，避免环境异常

      - name: 执行掘金签到+抽奖
        env:
          JUEJIN_COOKIE: ${{ secrets.JUEJIN_COOKIE }}
        run: |
          node -e "
            const https = require('https');
            
            // 封装掘金API请求（增加超时+错误捕获）
            function request(apiPath, method = 'POST', data = {}) {
              return new Promise((resolve, reject) => {
                // 设置5秒超时，避免卡壳
                const timeout = setTimeout(() => reject(new Error('API请求超时')), 5000);
                
                const postData = method === 'POST' ? JSON.stringify(data) : '';
                const options = {
                  hostname: 'api.juejin.cn',
                  port: 443,
                  path: apiPath,
                  method: method,
                  headers: {
                    'Cookie': process.env.JUEJIN_COOKIE,
                    'Content-Type': 'application/json; charset=utf-8',
                    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36',
                    'Referer': 'https://juejin.cn/',
                    'Origin': 'https://juejin.cn',
                    'Accept': 'application/json, text/plain, */*' // 新增：补充标准请求头
                  }
                };

                const req = https.request(options, (res) => {
                  clearTimeout(timeout); // 取消超时
                  let result = '';
                  res.on('data', (chunk) => { result += chunk; });
                  res.on('end', () => {
                    try {
                      resolve(JSON.parse(result));
                    } catch (e) {
                      // 非JSON响应也返回，方便排查
                      resolve({ raw: result, parse_error: e.message });
                    }
                  });
                });

                req.on('error', (e) => {
                  clearTimeout(timeout);
                  reject(e);
                });
                
                if (postData) req.write(postData);
                req.end();
              });
            }

            // 核心任务：签到+抽奖
            async function runTask() {
              try {
                console.log('[INFO] 开始执行掘金签到抽奖任务（北京时间：', new Date().toLocaleString(), '）');
                
                // 1. 执行签到
                const checkinRes = await request('/growth_api/v1/check_in', 'POST');
                console.log('[签到结果]', checkinRes);
                if (checkinRes.err_no === 0) {
                  console.log('[SUCCESS] 签到成功！');
                } else if (checkinRes.err_no === 11012) {
                  console.log('[INFO] 今日已签到');
                } else if (checkinRes.err_no) {
                  console.log('[ERROR] 签到失败：', checkinRes.err_msg || '未知错误');
                }

                // 2. 执行免费抽奖
                const drawRes = await request('/growth_api/v1/lottery/draw', 'POST');
                console.log('[抽奖结果]', drawRes);
                if (drawRes.err_no === 0) {
                  console.log('[SUCCESS] 抽奖成功！奖品：', drawRes.data?.lottery_name || '未知');
                } else if (drawRes.err_no === 11004) {
                  console.log('[INFO] 今日免费抽奖次数已用完');
                } else if (drawRes.err_no) {
                  console.log('[ERROR] 抽奖失败：', drawRes.err_msg || '未知错误');
                }

              } catch (error) {
                console.error('[FATAL] 任务执行失败：', error.message);
                process.exit(1);
              }
            }

            // 立即执行任务（无延迟，9:15准时跑）
            runTask();
          "
